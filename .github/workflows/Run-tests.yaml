name: Run tests
on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main
      - jg/APP-267

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Cache Gradle packages
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: 21
        cache: 'gradle'

    - name: Clean deps
      run: ./gradlew clean
      
    - name: Run all tests
      run: ./gradlew test