      username: sa
      password: fake.fake.fake.1234

nbs:
  security:
    tokenSecret: O5CaRj8zREImokS6sY9q9csloUnce0AB6TwO3mIyOHiIfydCwj+AYTYJdVUZrvTY/Ecs9irpPtVfqcl2qQWOCQ==
    tokenIssuer: gov.cdc.nbs
    tokenExpirationMillis: 1800000 # 30 minutes
