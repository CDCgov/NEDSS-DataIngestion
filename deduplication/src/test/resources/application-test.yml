      url: jdbc:sqlserver://localhost:2433;databaseName=deduplication;encrypt=true;trustServerCertificate=true;loginTimeout=3;
      username: sa
      password: fake.fake.fake.1234
    nbs:
      url: jdbc:sqlserver://localhost:2433;databaseName=NBS_ODSE;encrypt=true;trustServerCertificate=true;loginTimeout=3;
      username: sa
