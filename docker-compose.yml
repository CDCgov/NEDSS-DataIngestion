services:
  data-ingestion-service:
    build:
      context: ./
      dockerfile: ./data-ingestion-service/Dockerfile
    ports:
      - "8081:8081"
    depends_on:
      broker:
        condition: service_started
      di-keycloak:
        condition: service_started
      nbs-mssql:
        condition: service_healthy
    container_name: data-ingestion-service
    env_file:
      - dataingestion.env
    environment:
      SPRING_KAFKA_BOOTSTRAPSERVERS: broker:29092

  data-processing-service:
    build:
      context: ./
      dockerfile: ./data-processing-service/Dockerfile
    ports:
      - "8082:8082"
    depends_on:
      broker:
        condition: service_started
      di-keycloak:
        condition: service_started
      nbs-mssql:
        condition: service_healthy
    container_name: data-processing-service
    env_file:
      - dataingestion.env
    environment:
      SPRING_KAFKA_BOOTSTRAPSERVERS: broker:29092

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    hostname: zookeeper
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  broker:
    image: confluentinc/cp-kafka:7.3.0
    hostname: broker
    container_name: broker
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_LISTENERS: "INTERNAL://broker:29092,EXTERNAL://broker:9092"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://broker:29092,EXTERNAL://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"

  debezium:
    image: debezium/connect:2.4
    hostname: debezium
    container_name: debezium
    depends_on:
      - broker
      - zookeeper
    ports:
      - "8085:8083"
    environment:
      BOOTSTRAP_SERVERS: broker:29092
      GROUP_ID: connect-cluster
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      INTERNAL_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      INTERNAL_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      OFFSET_STORAGE_FILE_FILENAME: /tmp/connect.offsets
      OFFSET_FLUSH_INTERVAL_MS: 10000
      PLUGIN_PATH: /kafka/connect

      CONFIG_STORAGE_TOPIC: connect-configs
      OFFSET_STORAGE_TOPIC: connect-offsets
      STATUS_STORAGE_TOPIC: connect-status
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
    volumes:
      - ./containers/debezium/plugins:/kafka/connect

  nbs-mssql:
    image: ${DB_IMAGE:-ghcr.io/cdcent/nedssdb:latest}
    platform: linux/amd64
    container_name: di-mssql
    ports:
      - 2433:1433
    environment:
      - DATABASE_VERSION=${DB_VERSION:-6.0.18.1}
      - RUN_SEEDING=true
      - DATABASE_PASSWORD=${NBS_DBPASSWORD:-PizzaIsGood33!}
    env_file:
      - dataingestion.env
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/db_ready"]
      interval: 10s
      timeout: 5s
      retries: 10

  di-keycloak:
    container_name: di-keycloak
    image: quay.io/keycloak/keycloak:latest
    ports:
      - "8101:8080"
    volumes:
      - ./containers/keycloak/imports:/opt/keycloak/data/import
    env_file:
      - dataingestion.env
    entrypoint: "/opt/keycloak/bin/kc.sh start-dev --import-realm"

  di-wildfly:
    image: ${WILDFLY_IMAGE:-ghcr.io/cdcent/nedssdev:${DB_VERSION:-6.0.18.1}}
    platform: linux/amd64
    container_name: di-wildfly
    depends_on:
      nbs-mssql:
        condition: service_healthy
    ports:
      - 7002:7001
      - 8788:8787
      - 9991:9990

  di-record-linker:
    image: ghcr.io/cdcgov/recordlinker:v25.10.0
    container_name: di-record-linker
    depends_on:
      nbs-mssql:
        condition: service_healthy
    ports:
      - "8070:8070"
    env_file:
      - dataingestion.env
    environment:
      PORT: 8070
      API_ROOT_PATH: '/api/record-linker'
